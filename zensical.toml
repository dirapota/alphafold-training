[project]
site_name = "AlphaFold Training"
site_url = "https://dirapota.github.io/alphafold-training/"
repo_name = "dirapota/alphafold-training"
repo_url = "https://github.com/dirapota/alphafold-training"
extra_css = ["stylesheets/extra.css"]
copyright = """
    Copyright &copy; 2021-2025 SIB Swiss Institute of Bioinformatics -
    <a href="#__consent">Change cookie settings</a>
"""
extra_javascript = ["javascripts/consent.js"]

[project.extra.version]
provider = "mike"

[project.extra.consent]
title = "Cookie consent"
description = """
    We use cookies to recognize your repeated visits and preferences, as well
    as to measure the effectiveness of our training material and whether users
    find what they're searching for. With your consent, you're helping us to
    make our training material better.
"""

[project.extra.consent.cookies]
matomo = "Matomo Analytics"

nav = [
    {"Home" = "index.md"},
    {"Course schedule" = "course_schedule.md"},
    {"Day 2" = [
        {"Slides" = "day2/slides.md"},
        {"AlphaFold Server tutorial" = "day2/alphafold_server_tutorial.md"},
        {"Data" = "day2/data.md"}
    ]},
    {"Day 1" = [
        {"Slides" = "day1/slides.md"},
        {"ColabFold tutorial" = [
            {"Tutorial" = "day1/colabfold_tutorial.md"},
            {"Data" = "day1/data.md"}
        ]},
        {"Mol* tutorial" = "day1/mol_star_tutorial.md"}
    ]}
]

[project.theme]
logo = "assets/images/SIB_logo.svg"
favicon = "assets/images/SIB_logo.svg"
font.text = "Inter"

# Palette toggle for light mode
[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

# Palette toggle for dark mode
[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.markdown_extensions.abbr]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.tables]
[project.markdown_extensions.admonition]
[project.markdown_extensions.toc]
[project.markdown_extensions.pymdownx.superfences]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.pymdownx.tabbed]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.emoji]
emoji_index = "zensical.extensions.emoji.twemoji"
emoji_generator = "zensical.extensions.emoji.to_svg"
